version: '3.8'

services:
  yolo-tracking:
    build:
      context: ..
      dockerfile: arduino_q/Dockerfile
    container_name: yolo_cctv_tracker
    restart: unless-stopped
    network_mode: "host" # Allows container connection to local X server
    ipc: host           # Performance boost for graphical applications
    environment:
      - DISPLAY=${DISPLAY:-:0}
    devices:
      # Map the USB video device.
      - /dev/video2:/dev/video2
    volumes:
      # Persist the collected violations evidence on the host machine
      - ./Violations:/app/Violations
      # Mount X11 display socket
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
    # Default execution arguments (omit --headless to display GUI window on monitor)
    command: ["--camera", "2", "--model", "yolov8s.pt"]
